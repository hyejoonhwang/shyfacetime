<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShyFaceTime</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Sign-in screen -->
  <div id="login-screen" class="screen active">
    <h1>ShyFaceTime</h1>
    <p class="subtitle">a video call where you can only see the other person<br>when you're not looking</p>
    <button id="google-signin-btn">sign in with google</button>
  </div>

  <!-- Waiting room -->
  <div id="waiting-screen" class="screen">
    <div id="waiting-room-canvas"></div>
    <div id="waiting-overlay">
      <div id="my-profile">
        <img id="my-photo" src="" alt="">
        <span id="my-name"></span>
        <button id="signout-btn">sign out</button>
      </div>
      <div id="hover-name"></div>
    </div>

    <!-- Incoming call modal -->
    <div id="incoming-call" class="modal hidden">
      <div id="caller-info">
        <img id="caller-photo" src="" alt="">
        <p><span id="caller-name"></span> wants to call you</p>
      </div>
      <div class="modal-buttons">
        <button id="accept-btn">accept</button>
        <button id="decline-btn">decline</button>
      </div>
    </div>
  </div>

  <!-- Call screen -->
  <div id="call-screen" class="screen">
    <div id="canvas-container"></div>
    <video id="local-video" autoplay muted playsinline></video>
    <div id="call-controls">
      <button id="hangup-btn">hang up</button>
    </div>
    <div id="gaze-debug"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-auth-compat.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <script src="https://p5livemedia.itp.io/simplepeer.min.js"></script>
  <script src="https://p5livemedia.itp.io/p5livemedia.js"></script>
  <script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>
  <script src="waiting-room.js?v=10"></script>
  <script src="app.js?v=20260328x"></script>
</body>
</html>
